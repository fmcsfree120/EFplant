<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EFplant - Secure Access</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
:root{
  --bg:#0f172a;
  --sf:#1e293b;
  --cyan:#60a5fa; /* Brighter sky blue for logo/title */
  --red:#ef4444;
  --bd:#334155;
  --tx:#f1f5f9;
  --dim:#a2b9d2; /* Brighter slate blue for dark blue/gray text */
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  margin:0;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  height:100vh;display:flex;align-items:center;justify-content:center;
}
#lock-screen{width:100%;display:flex;justify-content:center;padding:16px;}
.panel{
  border:1px solid var(--bd);border-top:3px solid var(--cyan);
  padding:36px 28px;display:flex;flex-direction:column;
  align-items:center;gap:16px;background:var(--sf);
  border-radius:6px;width:100%;max-width:360px;
  box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);
}
.logo{
  font-size:1.8em;font-weight:700;letter-spacing:3px;
  color:var(--cyan);white-space:nowrap;text-align:center;
}
.sub{
  color:var(--dim);font-size:.72em;letter-spacing:1.5px;
  margin-top:-10px;text-transform:uppercase;white-space:nowrap;
}
hr{width:100%;border:none;border-top:1px solid var(--bd);}
.lbl{
  color:var(--dim);font-size:.72em;letter-spacing:1px;
  align-self:flex-start;white-space:nowrap;font-weight:600;
}
#pwd{
  width:100%;background:#0f172a;
  border:1px solid var(--bd);border-bottom:2px solid var(--cyan);
  color:#fff;font-family:inherit;font-size:1.1em;
  padding:11px 14px;outline:none;letter-spacing:4px;
  border-radius:4px 4px 0 0;
  transition:border-color 0.25s;
}
#pwd:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(59,130,246,0.15);}
#pwd.err{border-bottom-color:var(--red);}
#btn{
  width:100%;padding:12px;background:var(--cyan);border:none;
  color:#fff;font-family:inherit;font-size:.95em;
  font-weight:700;letter-spacing:1px;cursor:pointer;
  border-radius:4px;white-space:nowrap;transition:opacity .2s;
}
#btn:hover{opacity:.85;}
#btn:disabled{opacity:.5;cursor:not-allowed;}
#err{color:var(--red);display:none;font-size:.78em;
  letter-spacing:1px;white-space:nowrap;font-weight:600;}
#loading{display:none;color:var(--cyan);font-size:.75em;
  letter-spacing:1px;white-space:nowrap;}
</style>
</head>
<body>
<div id="lock-screen">
  <div class="panel">
    <div class="logo">EFplant</div>
    <div class="sub">Secure Access Terminal</div>
    <hr>
    <div class="lbl">ACCESS CODE</div>
    <input type="password" id="pwd"
           placeholder="&#x25CF;&#x25CF;&#x25CF;&#x25CF;&#x25CF;&#x25CF;&#x25CF;&#x25CF;"
           autocomplete="new-password" onkeydown="if(event.key==='Enter')go()">
    <button id="btn" onclick="go()">登入系統 / LOG IN</button>
    <div id="err">&#9888; ACCESS DENIED</div>
    <div id="loading">DECRYPTING... &#x23F3;</div>
    <hr style="width:100%;border:none;border-top:1px solid var(--bd);margin-top:4px;">
    <button onclick="clearAndReload()"
            style="background:transparent;border:none;color:var(--dim);
                   font-family:inherit;font-size:.68em;cursor:pointer;letter-spacing:1px;font-weight:600;">
      &#x1F504; 清除快取重新整理
    </button>
  </div>
</div>
<script>
// EFplant 資料/外殼分離架構
// data.enc 包含加密 payload + KEY_SAFES + salt + 時間戳（每小時更新）
// index.html 是靜態的，可被瀏覽器/PWA 自由快取，不會造成資料舊版問題

var SK = 'ef_sess_v2';
var SEXP = 30 * 60 * 1000;
var _efpDk = null;
var _efpLastUpdated = null;
var _efpPollStarted = false;

function saveSess(dkh) {
  try { localStorage.setItem(SK, JSON.stringify({dk:dkh, exp:Date.now()+SEXP})); } catch(e){}
}
function loadSess() {
  try {
    var d = JSON.parse(localStorage.getItem(SK));
    if (d && d.exp > Date.now() && d.dk) return d.dk;
  } catch(e){}
  localStorage.removeItem(SK);
  return null;
}

// 用使用者衍生金鑰解密 data.enc 取得儀表板 HTML
// 若 dk 無法在當前 KEY_SAFES 中找到對應 safe（例如 data.enc 已換新 salt），回傳 null
function decryptData(data, dkh) {
  var iid = dkh.substring(0, 32);
  var ekh = dkh.substring(32);
  var safe = data.key_safes[iid];
  if (!safe) return null;
  var ek = CryptoJS.enc.Hex.parse(ekh);
  var siv = CryptoJS.enc.Hex.parse(safe.iv);
  var cp = CryptoJS.lib.CipherParams.create({ciphertext:CryptoJS.enc.Hex.parse(safe.enc_master)});
  var mk = CryptoJS.AES.decrypt(cp, ek, {iv:siv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7});
  if (mk.sigBytes !== 32) return null;
  var piv = CryptoJS.enc.Base64.parse(data.payload_iv);
  var pc = CryptoJS.lib.CipherParams.create({ciphertext:CryptoJS.enc.Base64.parse(data.payload)});
  return CryptoJS.AES.decrypt(pc, mk, {iv:piv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7})
    .toString(CryptoJS.enc.Utf8) || null;
}

// 抓取最新 data.enc（每次都帶時間戳避免任何快取層）
function fetchData() {
  return fetch('data.enc?_=' + Date.now(), {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('fetch'); return r.json(); });
}

// 偵測新資料 → 自動 reload（index.html 是靜態的，reload 速度極快）
function checkForUpdate() {
  fetchData().then(function(data){
    if (_efpLastUpdated && data.updated > _efpLastUpdated) {
      location.reload();
    }
  }).catch(function(){});
}

// 開始輪詢更新
function startPolling() {
  if (_efpPollStarted) return;
  _efpPollStarted = true;
  setInterval(checkForUpdate, 60000);
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') checkForUpdate();
  });
}

function renderDashboard(data, dkh) {
  var html = decryptData(data, dkh);
  if (!html) return false;
  _efpDk = dkh;
  _efpLastUpdated = data.updated;
  saveSess(dkh);
  startPolling();
  document.open();
  document.write(html);
  document.close();
  return true;
}

function showError(msg) {
  var e = document.getElementById('err');
  if (e) {
    if (msg) e.textContent = msg;
    e.style.color = '#ff3d00';
    e.style.display = 'block';
  }
  var p = document.getElementById('pwd');
  if (p) { p.value = ''; p.classList.add('err'); }
  setTimeout(function(){
    if (e) e.style.display = 'none';
    if (p) p.classList.remove('err');
  }, 2000);
  if (p) p.focus();
}

function go() {
  var p = document.getElementById('pwd').value;
  if (!p) return;
  var e = document.getElementById('err');
  if (e) e.style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('btn').disabled = true;

  setTimeout(function(){
    fetchData().then(function(data){
      var salt = CryptoJS.enc.Hex.parse(data.salt);
      var dk = CryptoJS.PBKDF2(p, salt, {keySize:256/32, iterations:100000, hasher:CryptoJS.algo.SHA256});
      var dkh = CryptoJS.enc.Hex.stringify(dk);
      if (!renderDashboard(data, dkh)) {
        showError();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('btn').disabled = false;
      }
    }).catch(function(){
      showError('NETWORK ERROR');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('btn').disabled = false;
    });
  }, 50);
}

// 頁面載入：嘗試自動登入
window.addEventListener('DOMContentLoaded', function(){
  document.getElementById('pwd').value = '';
  var dkh = loadSess();
  if (!dkh) return;
  fetchData().then(function(data){
    if (!renderDashboard(data, dkh)) {
      localStorage.removeItem(SK);
    }
  }).catch(function(){});
});

// 強制登出並徹底清除 Service Worker / Browser Caches
function clearAndReload() {
  localStorage.removeItem(SK);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      var promises = [];
      for (var i = 0; i < regs.length; i++) {
        promises.push(regs[i].unregister());
      }
      return Promise.all(promises);
    }).then(function() {
      if ('caches' in window) {
        return caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        });
      }
    }).then(function() {
      var base = location.protocol + '//' + location.host + location.pathname;
      location.replace(base + '?_nc=' + Date.now());
    }).catch(function() {
      location.reload();
    });
    return;
  }
  location.reload();
}

// Service Worker：強制 data.enc/health.json 從網路抓，index.html 可快取
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(function(){});
}
</script>
</body>
</html>
