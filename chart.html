<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>EFplant - Quality Trend Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- 引入 CryptoJS 與 Apache ECharts 繪圖庫 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script>
// 立即防禦性 Session 驗證，防止未授權直接進入而閃爍
(function() {
  var SK = 'ef_sess_v2';
  try {
    var d = JSON.parse(localStorage.getItem(SK));
    if (!d || d.exp <= Date.now() || !d.dk) {
      localStorage.removeItem(SK);
      window.location.replace("index.html");
    }
  } catch(e) {
    localStorage.removeItem(SK);
    window.location.replace("index.html");
  }
})();
</script>
<style>
:root {
  --bg: #0f172a;      /* 深藍黑色背景 */
  --sf: #1e293b;      /* 中度藍灰面板 */
  --sf2: #334155;     /* 亮藍灰邊框 hover 狀態 */
  --bd: #334155;      /* 邊框線條 */
  --bd2: #475569;     /* 亮邊框線條 */
  --cyan: #00aaff;    /* 亮天藍色 */
  --blue: #60a5fa;    /* 經典亮藍色 */
  --amb: #f59e0b;     /* 亮黃琥珀色 */
  --tx: #f1f5f9;      /* 近白色文字 */
  --dim: #a2b9d2;     /* 亮灰藍色（易讀性高） */
  --mono: 'Share Tech Mono', Consolas, Monaco, monospace;
  --run: #10b981;     /* Solid Emerald Green */
  --stop: #ef4444;    /* Solid Red */
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--tx);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  border-bottom: 1px solid var(--bd);
  background: var(--sf);
  flex-shrink: 0;
}

.back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--bd2);
  border-radius: 3px;
  color: var(--blue);
  text-decoration: none;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.15s;
  cursor: pointer;
  white-space: nowrap;
}

.back-btn:hover {
  background: var(--sf2);
  color: var(--tx);
  border-color: var(--tx);
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-shrink: 0;
  margin-left: 6px;
}

.bname {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: 1px;
  white-space: nowrap;
}

.bsub {
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.5px;
  white-space: nowrap;
  font-weight: 600;
}

.upd {
  margin-left: auto;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--amb);
  white-space: nowrap;
}
.pulse {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: all 0.5s;
  cursor: help;
}
.pulse.ok {
  background: var(--run);
  box-shadow: 0 0 6px var(--run);
}
.pulse.warn {
  background: var(--amb);
  box-shadow: 0 0 6px var(--amb);
}
.pulse.bad {
  background: var(--stop);
  box-shadow: 0 0 8px var(--stop);
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* MAIN CONTENT AREA */
.main-container {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* QUALITY METRIC TABS */
.tabs-container {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none; /* Firefox */
  padding-bottom: 2px;
  flex-shrink: 0;
}

.tabs-container::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

.tab-btn {
  padding: 6px 14px;
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 4px;
  color: var(--dim);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.tab-btn.active {
  background: rgba(96, 165, 250, 0.15);
  border-color: var(--blue);
  color: var(--blue);
}

.tab-btn:hover:not(.active) {
  border-color: var(--bd2);
  color: var(--tx);
}

.tab-btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* CHART PANEL CARD */
.chart-card {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 6px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.chart-header {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

@media (min-width: 680px) {
  .chart-header {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
}

.chart-title-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.chart-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--tx);
  letter-spacing: 0.5px;
}

.chart-subtitle {
  font-size: 0.72rem;
  color: var(--dim);
}

/* ZOOM CONTROLS (MacroMicro Style) */
.zoom-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(0, 0, 0, 0.2);
  padding: 3px 6px;
  border-radius: 4px;
  border: 1px solid var(--bd);
  align-self: flex-start;
}

.zoom-lbl {
  font-size: 0.68rem;
  color: var(--dim);
  font-weight: 600;
  margin-right: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.zoom-btn {
  padding: 3px 8px;
  background: transparent;
  border: none;
  border-radius: 3px;
  color: var(--dim);
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.zoom-btn.active {
  background: var(--blue);
  color: #0f172a;
}

.zoom-btn:hover:not(.active) {
  color: var(--tx);
  background: rgba(255, 255, 255, 0.05);
}

/* CHART RENDER CONTAINER */
.chart-viewport {
  width: 100%;
  height: 50vh;
  min-height: 380px;
  position: relative;
}

/* 手機直向 portrait */
@media (max-width: 600px) and (orientation: portrait) {
  .chart-viewport {
    height: 340px;
    min-height: 300px;
  }
}

/* 手機橫向 landscape */
@media (max-height: 600px) and (orientation: landscape) {
  .chart-viewport {
    height: 220px;
    min-height: 180px;
  }
}

/* SCADA METRIC INFO GRID */
.metric-info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 4px;
}

.info-card {
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--bd);
  padding: 8px 12px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.info-lbl {
  font-size: 0.62rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
}

.info-val {
  font-family: var(--mono);
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
}

@media (max-width: 600px) {
  .metric-info-grid {
    grid-template-columns: 1.1fr 0.9fr;
  }
  .info-card {
    padding: 8px 8px;
  }
  .info-val {
    font-size: 0.95rem;
  }
}

.info-card.normal .info-val { color: #10b981; }
.info-card.warning .info-val { color: var(--amb); }

footer {
  margin-top: auto;
  padding: 10px 0;
  text-align: center;
  color: var(--dim);
  font-size: 0.65rem;
  font-family: var(--mono);
  letter-spacing: 0.5px;
  border-top: 1px solid var(--bd);
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">&#x2190; BACK</a>
  <div class="brand">
    <span class="bname">EFplant</span>
  </div>
  <div class="upd">
    <span class="pulse" id="status-pulse" title="checking..."></span>
    <span id="next-update-time">NEXT: --/-- --:--</span>
  </div>
</header>

<div class="main-container">
  <!-- 能效數據切換 Tabs -->
  <div class="tabs-container">
    <button class="tab-btn active" id="tab-ch" onclick="switchMetric('冰機效率', this)">冰機效率</button>
    <button class="tab-btn" id="tab-cda" onclick="switchMetric('空壓效率', this)">空壓效率</button>
  </div>

  <!-- 折線圖面板 -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title-group">
        <div class="chart-title">冰機運轉效率趨勢圖</div>
        <div class="chart-subtitle">各廠區冰機綜合效率 (kW/RT，越低代表能效表現越佳)</div>
      </div>
      
      <!-- MacroMicro 縮放快捷鍵 -->
      <div class="zoom-controls">
        <span class="zoom-lbl">Zoom:</span>
        <button class="zoom-btn active" id="btn-7d" onclick="zoomRange('7d', this)">All (7d)</button>
        <button class="zoom-btn" id="btn-3d" onclick="zoomRange('3d', this)">3d</button>
        <button class="zoom-btn" id="btn-1d" onclick="zoomRange('1d', this)">1d</button>
        <button class="zoom-btn" id="btn-12h" onclick="zoomRange('12h', this)">12h</button>
        <button class="zoom-btn" id="btn-6h" onclick="zoomRange('6h', this)">6h</button>
      </div>
    </div>

    <!-- ECharts 渲染視窗 -->
    <div id="trend-chart" class="chart-viewport"></div>

    <!-- 底部 SCADA 能效指標規格 -->
    <div class="metric-info-grid">
      <div class="info-card normal">
        <div class="info-lbl" id="card-lbl-normal">正常運轉控制線</div>
        <div class="info-val" id="card-val-normal">--</div>
      </div>
      <div class="info-card warning">
        <div class="info-lbl" id="card-lbl-warning">預警警報限制線</div>
        <div class="info-val" id="card-val-warning">--</div>
      </div>
    </div>
  </div>

  <footer>
    EFplant FMCS Smart Plant Integration &copy; 2026
  </footer>
</div>

<script>
// 1. 各廠區標準名稱（對照設備頁面的 nav 排列）
const PLANTS = ["T2A", "S2A", "PCB", "S2", "S3", "HJ1", "HJ2", "LC2", "LC3"];

// 2. 廠區專屬 HSL 調和科技色彩
const PLANT_COLORS = {
  "T2A": "#38bdf8", // 亮天藍
  "S2A": "#10b981", // 翡翠綠
  "PCB": "#a855f7", // 皇家紫
  "S2":  "#f59e0b",  // 琥珀橘
  "S3":  "#f43f5e",  // 玫瑰紅
  "HJ1": "#06b6d4", // 青綠色
  "HJ2": "#ec4899", // 粉紅色
  "LC2": "#3b82f6", // 鮮藍色
  "LC3": "#14b8a6"  // 藍綠色
};

var SK = 'ef_sess_v2';
var myChart = null;
var currentMetric = '冰機效率';
var chartTimestamps = [];
var chartSeriesData = {};

function loadSess() {
  try {
    var d = JSON.parse(localStorage.getItem(SK));
    if (d && d.exp > Date.now() && d.dk) return d.dk;
  } catch(e){}
  localStorage.removeItem(SK);
  return null;
}

function decryptChartData(data, dkh) {
  var iid = dkh.substring(0, 32);
  var ekh = dkh.substring(32);
  var safe = data.key_safes[iid];
  if (!safe) return null;
  var ek = CryptoJS.enc.Hex.parse(ekh);
  var siv = CryptoJS.enc.Hex.parse(safe.iv);
  var cp = CryptoJS.lib.CipherParams.create({ciphertext:CryptoJS.enc.Hex.parse(safe.enc_master)});
  var mk = CryptoJS.AES.decrypt(cp, ek, {iv:siv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7});
  if (mk.sigBytes !== 32) return null;
  
  var civ = CryptoJS.enc.Base64.parse(data.chart_iv);
  var cc = CryptoJS.lib.CipherParams.create({ciphertext:CryptoJS.enc.Base64.parse(data.chart_payload)});
  return CryptoJS.AES.decrypt(cc, mk, {iv:civ, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7})
    .toString(CryptoJS.enc.Utf8) || null;
}

function fetchData() {
  return fetch('data.enc?_=' + Date.now(), {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('fetch'); return r.json(); });
}

function initChart() {
  const chartDom = document.getElementById('trend-chart');
  myChart = echarts.init(chartDom);
  renderChartData();
}

function renderChartData() {
  if (!myChart || !chartTimestamps.length) return;

  var metricData = chartSeriesData[currentMetric] || {};
  
  // 建立 9 個廠區折線序列
  const seriesArray = PLANTS.map(p => {
    var dataVals = metricData[p] || [];
    return {
      name: p,
      type: 'line',
      data: dataVals,
      showSymbol: true,
      symbolSize: 6,
      connectNulls: true,
      smooth: 0.2, // 微微平滑
      lineStyle: {
        width: 2.2,
        shadowBlur: 8,
        shadowColor: `${PLANT_COLORS[p]}4D`
      },
      itemStyle: {
        color: PLANT_COLORS[p]
      },
      emphasis: {
        focus: 'series',
        lineStyle: {
          width: 3.5,
          shadowBlur: 12
        }
      }
    };
  });

  var yMin = currentMetric === '冰機效率' ? 0.45 : 4.0;
  var yMax = currentMetric === '冰機效率' ? 1.25 : 15.0;
  var yUnit = currentMetric === '冰機效率' ? ' kW/RT' : ' CMM/KWH';

  const option = {
    backgroundColor: 'transparent',
    grid: {
      top: 35,
      bottom: 85,
      left: 55,
      right: 25,
      containLabel: false
    },
    xAxis: {
      type: 'category',
      data: chartTimestamps,
      boundaryGap: false,
      axisLine: {
        lineStyle: { color: '#334155', width: 1.5 }
      },
      axisLabel: {
        color: '#a2b9d2',
        fontSize: 10,
        fontFamily: 'Share Tech Mono, monospace',
        formatter: function(value) {
          const parts = value.split(' ');
          const datePart = parts[0].substring(5); // MM-DD
          const timePart = parts[1]; // HH:00
          return `${datePart}\n${timePart}`;
        }
      },
      splitLine: {
        show: true,
        lineStyle: { color: 'rgba(51, 65, 85, 0.25)' }
      },
      axisPointer: {
        show: true,
        type: 'line',
        lineStyle: {
          color: '#60a5fa',
          width: 1.2,
          type: 'dashed'
        }
      }
    },
    yAxis: {
      type: 'value',
      min: yMin,
      max: yMax,
      axisLine: {
        show: false
      },
      axisLabel: {
        color: '#a2b9d2',
        fontSize: 10,
        fontFamily: 'Share Tech Mono, monospace',
        formatter: function(v) {
          return `${v.toFixed(currentMetric === '冰機效率' ? 2 : 1)}${yUnit}`;
        }
      },
      splitLine: {
        show: true,
        lineStyle: { color: 'rgba(51, 65, 85, 0.35)' }
      }
    },
    dataZoom: [
      {
        type: 'slider',
        show: false,
        start: 0,
        end: 100
      }
    ],
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      borderWidth: 1,
      padding: [10, 14],
      textStyle: {
        color: '#f1f5f9'
      },
      position: function (point, params, dom, rect, size) {
        var x = point[0];
        var y = point[1];
        var viewW = size.viewSize[0];
        var viewH = size.viewSize[1];
        var boxW = size.contentSize[0];
        var boxH = size.contentSize[1];
        
        var posX = 0;
        if (x > viewW / 2) {
          posX = x - boxW - 15;
        } else {
          posX = x + 15;
        }
        
        if (posX < 5) posX = 5;
        if (posX + boxW > viewW - 5) {
          posX = viewW - boxW - 5;
        }
        
        var posY = y - boxH / 2;
        if (posY < 5) posY = 5;
        if (posY + boxH > viewH - 5) {
          posY = viewH - boxH - 5;
        }
        
        return [posX, posY];
      },
      formatter: function (params) {
        if (!params || params.length === 0) return '';
        
        // 篩選出有真實有效數據點的廠區
        const validParams = params.filter(p => {
          let val = p.value;
          if (Array.isArray(val)) val = val[1];
          return val !== undefined && val !== null && val !== '' && typeof val !== 'object' && !isNaN(parseFloat(val));
        });
        if (validParams.length === 0) return '';
        
        let html = `<div style="font-family: inherit; font-size: 13px; line-height: 1.6; color: #f1f5f9; min-width: 200px;">`;
        const timeVal = validParams[0].axisValue;
        html += `<div style="font-weight: 700; border-bottom: 1px solid #334155; padding-bottom: 6px; margin-bottom: 8px; color: #60a5fa; font-family: var(--mono); letter-spacing: 0.5px;">📅 ${timeVal}</div>`;
        
        // 冰機效率越小越好 (由小到大排序)；空壓效率越大越好 (由大到小排序)
        const sortedParams = [...validParams].sort((a, b) => {
          if (currentMetric === '冰機效率') {
            return a.value - b.value;
          } else {
            return b.value - a.value;
          }
        });
        
        sortedParams.forEach(p => {
          var formattedVal = Number(p.value).toFixed(currentMetric === '冰機效率' ? 3 : 2);
          html += `
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;">
            <span style="display: flex; align-items: center; gap: 6px; color: #a2b9d2;">
              <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: ${p.color}; box-shadow: 0 0 6px ${p.color};"></span>
              <span style="font-weight: 600;">${p.seriesName}</span>
            </span>
            <span style="font-family: var(--mono); font-weight: 700; color: #ffffff; padding-left: 14px;">${formattedVal} <span style="font-size: 10px; color: #64748b; font-weight: normal;">${currentMetric === '冰機效率' ? 'kW/RT' : 'CMM/KWH'}</span></span>
          </div>`;
        });
        html += `</div>`;
        return html;
      }
    },
    legend: {
      show: true,
      bottom: 8,
      left: 'center',
      itemWidth: 10,
      itemHeight: 10,
      itemGap: 12,
      textStyle: {
        color: '#a2b9d2',
        fontSize: 11,
        fontWeight: 600
      },
      icon: 'circle',
      data: PLANTS
    },
    series: seriesArray
  };

  myChart.setOption(option, true);
}

function switchMetric(metric, btn) {
  if (currentMetric === metric) return;
  currentMetric = metric;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // 更新標題與副標題
  const titleEl = document.querySelector('.chart-title');
  const subEl = document.querySelector('.chart-subtitle');
  if (metric === '冰機效率') {
    if (titleEl) titleEl.textContent = '冰機運轉效率趨勢圖';
    if (subEl) subEl.textContent = '各廠區冰機綜合效率 (kW/RT，越低代表能效表現越佳)';
    
    // 更新底部 SCADA 卡片
    document.getElementById('card-lbl-normal').textContent = '正常運轉控制線';
    document.getElementById('card-val-normal').textContent = '< 0.70 kW/RT';
    document.getElementById('card-lbl-warning').textContent = '預警警報限制線 (HIGH)';
    document.getElementById('card-val-warning').textContent = '0.85 kW/RT';
  } else {
    if (titleEl) titleEl.textContent = '空壓運轉效率趨勢圖';
    if (subEl) subEl.textContent = '各廠區空壓系統綜合效率 (CMM/KWH，越高代表能效表現越佳)';
    
    // 更新底部 SCADA 卡片
    document.getElementById('card-lbl-normal').textContent = '正常運轉控制線';
    document.getElementById('card-val-normal').textContent = '> 7.00 CMM/KWH';
    document.getElementById('card-lbl-warning').textContent = '預警警報限制線 (LOW)';
    document.getElementById('card-val-warning').textContent = '6.00 CMM/KWH';
  }

  // 重新渲染圖表
  renderChartData();
  
  // 重設 zoom 到 7d (全畫面)
  var btn7d = document.getElementById('btn-7d');
  if (btn7d) {
    zoomRange('7d', btn7d);
  }
}

function zoomRange(range, btn) {
  document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const totalPoints = chartTimestamps.length;
  if (!totalPoints) return;
  const endIdx = totalPoints - 1;
  let startIdx = 0;

  if (range === '7d') {
    startIdx = 0;
  } else if (range === '3d') {
    startIdx = Math.max(0, endIdx - 72);
  } else if (range === '1d') {
    startIdx = Math.max(0, endIdx - 24);
  } else if (range === '12h') {
    startIdx = Math.max(0, endIdx - 12);
  } else if (range === '6h') {
    startIdx = Math.max(0, endIdx - 6);
  }

  if (myChart) {
    myChart.dispatchAction({
      type: 'dataZoom',
      startValue: startIdx,
      endValue: endIdx
    });
  }
}

window.addEventListener('resize', function() {
  if (myChart) {
    myChart.resize();
  }
});

var GEN_TIME = null;

function initStatusPulse(updatedTimeStr) {
  GEN_TIME = new Date(updatedTimeStr);
  
  // 計算下一次更新整點時間
  var nextHour = new Date(GEN_TIME.getTime() + 60 * 60 * 1000);
  nextHour.setMinutes(0);
  nextHour.setSeconds(0);
  nextHour.setMilliseconds(0);
  
  var mm = String(nextHour.getMonth() + 1).padStart(2, '0');
  var dd = String(nextHour.getDate()).padStart(2, '0');
  var hh = String(nextHour.getHours()).padStart(2, '0');
  var nextStr = mm + '/' + dd + ' ' + hh + ':00';
  
  var nextEl = document.getElementById('next-update-time');
  if (nextEl) {
    nextEl.textContent = 'NEXT: ' + nextStr;
  }
  
  updateStatus();
  setInterval(updateStatus, 60000);
}

function updateStatus() {
  if (!GEN_TIME) return;
  const minPast = (Date.now() - GEN_TIME) / 60000;
  const p = document.getElementById('status-pulse');
  if (!p) return;
  const INTERVAL_MIN = 60, GRACE_MIN = 15;
  if (minPast < INTERVAL_MIN + GRACE_MIN) {
    p.className = 'pulse ok';
    p.title = 'DATA OK — generated ' + GEN_TIME.toLocaleTimeString() + ' | Next update ~' + new Date(GEN_TIME.getTime() + (INTERVAL_MIN + GRACE_MIN) * 60000).toLocaleTimeString();
  } else if (minPast < INTERVAL_MIN * 2 + GRACE_MIN) {
    p.className = 'pulse warn';
    p.title = 'UPDATE OVERDUE — refresh page for new data';
  } else {
    p.className = 'pulse bad';
    p.title = 'PIPELINE BROKEN — check main.py is running';
  }
}

window.addEventListener('DOMContentLoaded', function() {
  var dkh = loadSess();
  if (!dkh) {
    window.location.replace("index.html");
    return;
  }

  fetchData().then(function(data) {
    var decrypted = decryptChartData(data, dkh);
    if (!decrypted) {
      localStorage.removeItem(SK);
      window.location.replace("index.html");
      return;
    }

    var parsed = JSON.parse(decrypted);
    chartTimestamps = parsed.timestamps || [];
    chartSeriesData = parsed.metrics || {};
    
    // 初始化運轉狀態燈號與下一次更新倒數
    if (data.updated) {
      initStatusPulse(data.updated);
    }
    
    // 初始化卡片數據
    document.getElementById('card-lbl-normal').textContent = '正常運轉控制線';
    document.getElementById('card-val-normal').textContent = '< 0.70 kW/RT';
    document.getElementById('card-lbl-warning').textContent = '預警警報限制線 (HIGH)';
    document.getElementById('card-val-warning').textContent = '0.85 kW/RT';

    // 初始化圖表
    initChart();
  }).catch(function(err) {
    console.error("資料載入失敗", err);
    localStorage.removeItem(SK);
    window.location.replace("index.html");
  });
});
</script>
