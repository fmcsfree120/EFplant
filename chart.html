<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EFplant - Trend Chart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#080c10;color:#a2b9d2;
  font-family:'Courier New',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
}
.back{
  position:fixed;top:12px;left:14px;padding:5px 12px;
  border:1px solid #1a2d45;border-radius:2px;
  color:#60a5fa;text-decoration:none;font-size:.75rem;letter-spacing:1px;
}
.back:hover{background:#0c1420;}
.icon{font-size:3rem;}
.title{font-size:.85rem;letter-spacing:4px;color:#a2b9d2;text-transform:uppercase;}
.box{
  border:1px dashed #1a2d45;padding:14px 28px;text-align:center;
  font-size:.68rem;color:#a2b9d2;line-height:2.2;letter-spacing:.5px;
}
</style>
</head>
<body>
<a href="index.html" class="back">&#x2190; BACK</a>
<div class="icon">&#x1F4CA;</div>
<div class="title">Trend Chart</div>
<div class="box">
  趨勢圖功能建置中<br>
  Under Construction<br>
  Trend chart coming soon
</div>
<footer style="margin-top:20px;text-align:center;font-family:'Courier New',monospace;font-size:.65rem;color:#a2b9d2;">
  EFplant FMCS Smart Plant Integration &copy; 2026<br>
  <button onclick="clearAndReload()" 
          style="background:transparent;border:none;color:#a2b9d2;
                 font-family:inherit;font-size:inherit;cursor:pointer;
                 letter-spacing:0.5px;margin-top:6px;font-weight:600;text-decoration:underline;">
    &#x1F504; 清除快取重新整理
  </button>
</footer>
<script>
function clearAndReload() {
  localStorage.removeItem('ef_sess_v2');
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      var promises = [];
      for (var i = 0; i < regs.length; i++) {
        promises.push(regs[i].unregister());
      }
      return Promise.all(promises);
    }).then(function() {
      if ('caches' in window) {
        return caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        });
      }
    }).then(function() {
      var base = location.protocol + '//' + location.host + location.pathname;
      location.replace(base + '?_nc=' + Date.now());
    }).catch(function() {
      location.reload();
    });
    return;
  }
  location.reload();
}
</script>
</body>
</html>
